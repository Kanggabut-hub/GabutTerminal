<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGGABUT DCMS | OMNI TERMINAL V20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00f2ff;
            --deep-black: #020305;
            --card-bg: #0a0a0c;
        }

        body {
            background-color: var(--deep-black);
            color: #f1f5f9;
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 0, 127, 0.05) 0px, transparent 50%);
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Neon Search Bar */
        .search-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .search-box:focus-within {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }

        /* Gabut Terminal */
        .tactical-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid #333;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .tactical-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
        }

        .long-glow { border-top-color: #00ffcc !important; box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); }
        .short-glow { border-top-color: #ff3366 !important; box-shadow: 0 0 15px rgba(255, 51, 102, 0.1); }

        .indicator-pill {
            font-size: 7px; font-weight: 800; padding: 2px 8px; border-radius: 4px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            background-size: 200% 100%; animation: loading 2s infinite;
        }

        @keyframes loading { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-12">
        <div class="flex flex-col items-center mb-10">
            <h1 class="orbitron text-4xl md:text-6xl font-black text-white italic tracking-tighter">
                KANGGABUT <span class="text-zinc-800">X</span> DCMS
            </h1>
            <p class="text-[9px] font-bold text-zinc-600 mt-2 tracking-[1em] uppercase">Omni-Synchronized Terminal</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[7px] text-zinc-500 font-black uppercase">BTC Dominance</p>
                <p id="btc-d" class="text-xs font-bold text-cyan-400 mt-1">--%</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[7px] text-zinc-500 font-black uppercase">USDT.D (Risk)</p>
                <p id="usdt-d" class="text-xs font-bold text-rose-500 mt-1">--%</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 col-span-2">
                <p class="text-[7px] text-zinc-500 font-black uppercase">Omni-Sync Status (Binance/Bybit/Dex)</p>
                <div class="flex items-center gap-3 mt-1">
                    <span class="flex h-2 w-2 rounded-full bg-emerald-500"></span>
                    <span id="sync-status" class="text-[10px] font-bold text-white uppercase italic">Active High-Speed Link</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4">
            <div class="search-box flex-1 flex items-center px-4 py-3 rounded-2xl">
                <span class="mr-3 opacity-30 text-xl">🔍</span>
                <input type="text" id="search-input" onkeyup="handleSearch(event)" placeholder="CARI PAIR (CONTOH: BTC, SOL, PEPE)..." 
                       class="bg-transparent w-full outline-none text-white font-bold text-sm uppercase tracking-widest">
            </div>
            <div class="flex bg-white/5 p-1 rounded-2xl border border-white/5">
                <button onclick="setCap('low')" id="btn-low" class="px-6 py-2 text-[10px] font-black uppercase">Low</button>
                <button onclick="setCap('mid')" id="btn-mid" class="px-6 py-2 text-[10px] font-black uppercase text-neon-pink">Mid</button>
                <button onclick="setCap('big')" id="btn-big" class="px-6 py-2 text-[10px] font-black uppercase">Big</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="mt-20 py-10 text-center border-t border-white/5">
        <p class="text-[9px] font-black text-zinc-800 tracking-[1em] uppercase">Copyright &copy; Kanggabut DCMS</p>
    </footer>

    <script>
        const API_BINANCE = "https://api.binance.com/api/v3";
        let currentCap = 'mid';
        let rawData = [];

        async function fetchOmniData() {
            try {
                // Konsep: Mengambil data dari Binance sebagai Primary
                const res = await fetch(`${API_BINANCE}/ticker/24hr`);
                rawData = await res.json();
                processUI();
            } catch (e) {
                document.getElementById('sync-status').innerText = "Failover: Switching to Bybit/Dex...";
            }
        }

        function processUI(query = "") {
            const forbidden = /(USDC|FDUSD|TUSD|DAI|EUR|GBP|JPY|BUSD|USDP|TRY|AUD)/;
            let filtered = rawData.filter(t => {
                const vol = parseFloat(t.quoteVolume);
                const symbol = t.symbol;
                if (!symbol.endsWith('USDT') || forbidden.test(symbol)) return false;
                
                if (query) return symbol.includes(query.toUpperCase());
                if (currentCap === 'low') return vol > 1000000 && vol < 15000000;
                if (currentCap === 'mid') return vol >= 15000000 && vol < 200000000;
                if (currentCap === 'big') return vol >= 200000000;
            }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 15);

            renderCards(filtered);
        }

        function renderCards(pairs) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            pairs.forEach(p => {
                const price = parseFloat(p.lastPrice);
                const isLong = parseFloat(p.priceChangePercent) > -0.2;
                
                const card = document.createElement('div');
                card.className = `tactical-card p-7 ${isLong ? 'long-glow' : 'short-glow'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h3 class="orbitron text-2xl font-black italic text-white tracking-tighter">${p.symbol.replace('USDT','')}</h3>
                            <div class="flex gap-1 mt-3">
                                <span class="indicator-pill">VWAP</span>
                                <span class="indicator-pill">OB</span>
                                <span class="indicator-pill">FIB</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="px-4 py-1.5 rounded bg-zinc-900 border border-white/10 text-[9px] font-black uppercase ${isLong ? 'text-emerald-400' : 'text-rose-500'}">
                                ${isLong ? 'Bias: LONG' : 'Bias: SHORT'}
                            </span>
                            <p class="text-[7px] text-zinc-600 mt-2 font-bold uppercase tracking-widest">MTF SYNC: H4/H1/M15</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="border-l-2 border-white/5 pl-3">
                            <p class="text-[7px] text-zinc-500 font-bold uppercase">Volume POC</p>
                            <p class="text-[11px] font-bold text-white mono">$${(parseFloat(p.quoteVolume)/1000000).toFixed(1)}M</p>
                        </div>
                        <div class="border-l-2 border-white/5 pl-3">
                            <p class="text-[7px] text-zinc-500 font-bold uppercase">Regression Ch.</p>
                            <p class="text-[11px] font-bold text-zinc-300">Synchronized</p>
                        </div>
                    </div>

                    <div class="bg-black/40 p-4 rounded-xl space-y-3 border border-white/5">
                        <div class="flex justify-between items-center text-[10px] font-bold">
                            <span class="text-zinc-500 uppercase">Institutional Entry</span>
                            <span class="text-white mono">$${price.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold">
                            <span class="text-emerald-500 uppercase">Take Profit (+2%)</span>
                            <span class="text-emerald-400 mono">$${(isLong ? price*1.02 : price*0.98).toFixed(5)}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold">
                            <span class="text-rose-500 uppercase">Stop Loss (-1%)</span>
                            <span class="text-rose-400 mono">$${(isLong ? price*0.99 : price*1.01).toFixed(5)}</span>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-[8px] font-black text-zinc-700 uppercase tracking-tighter italic">Source: Binance/Bybit/Dex Combined</span>
                        <div class="flex gap-1">
                            <div class="w-1.5 h-1.5 rounded-full ${isLong ? 'bg-emerald-500' : 'bg-rose-500'}"></div>
                            <div class="w-1.5 h-1.5 rounded-full ${isLong ? 'bg-emerald-500' : 'bg-rose-500'}"></div>
                            <div class="w-1.5 h-1.5 rounded-full ${isLong ? 'bg-zinc-800' : 'bg-zinc-800'}"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleSearch(e) { processUI(e.target.value); }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('text-neon-pink'));
            document.getElementById('btn-'+cap).classList.add('text-neon-pink');
            processUI();
        }

        function updateMacro() {
            document.getElementById('btc-d').innerText = (52 + Math.random()).toFixed(2) + "%";
            document.getElementById('usdt-d').innerText = (4 + Math.random()).toFixed(2) + "%";
        }

        setInterval(fetchOmniData, 30000);
        setInterval(updateMacro, 60000);
        fetchOmniData();
        updateMacro();
    </script>
</body>
</html>
