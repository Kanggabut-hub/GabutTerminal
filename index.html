<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGGABUT TERMINAL | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020202;
            color: #fff;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: #00ffcc;
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .neon-text { text-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .gradient-text {
            background: linear-gradient(90deg, #00ffcc, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
        <div class="text-center md:text-left">
            <h1 class="text-4xl font-extrabold tracking-tighter neon-text">KANGGABUT<span class="text-zinc-600 font-light italic">TERMINAL</span></h1>
            <p class="text-[11px] uppercase tracking-[0.5em] gradient-text font-bold mt-1">Kegabutan Sumber Cuan</p>
        </div>
        <div class="glass-card px-6 py-3 flex gap-8 items-center border-white/5">
            <div class="text-center">
                <p class="text-[9px] text-zinc-500 uppercase font-bold">Signal Node</p>
                <p class="text-xs font-bold text-emerald-400">BINANCE_LIVE</p>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="text-center font-mono">
                <p class="text-[9px] text-zinc-500 uppercase font-bold text-right">Refresh_In</p>
                <p id="timer" class="text-xs text-white text-right">60s</p>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <p id="clock" class="text-sm font-bold mono">00:00:00</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="loader" class="flex flex-col items-center justify-center py-32 gap-4">
            <div class="relative w-12 h-12">
                <div class="absolute w-full h-full border-4 border-emerald-500/20 rounded-full"></div>
                <div class="absolute w-full h-full border-4 border-t-emerald-500 rounded-full animate-spin"></div>
            </div>
            <p class="text-[10px] mono text-zinc-500 tracking-[0.3em] uppercase animate-pulse">Syncing Global Market Data...</p>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-0 transition-opacity duration-1000">
            </div>
    </main>

    <script>
        const BINANCE_API = "https://api.binance.com/api/v3";
        let timeLeft = 60;

        // Clock & Refresh Timer
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) {
                timeLeft = 60;
                fetchSignals();
            }
        }, 1000);

        async function fetchSignals() {
            try {
                // Ambil ticker 24 jam untuk filter volume
                const tickerResp = await fetch(`${BINANCE_API}/ticker/24hr`);
                const tickers = await tickerResp.json();
                
                // Ambil koin USDT dengan volume tertinggi (top 20)
                const topPairs = tickers
                    .filter(t => t.symbol.endsWith('USDT'))
                    .sort((a, b) => b.quoteVolume - a.quoteVolume)
                    .slice(0, 20);

                const grid = document.getElementById('grid');
                const loader = document.getElementById('loader');

                // Ambil data candle untuk setiap koin (Parallel)
                const signalData = await Promise.all(
                    topPairs.map(async (p) => {
                        const candleResp = await fetch(`${BINANCE_API}/klines?symbol=${p.symbol}&interval=1h&limit=20`);
                        const candles = await candleResp.json();
                        return { 
                            symbol: p.symbol, 
                            price: p.lastPrice, 
                            candles: candles,
                            vol: p.quoteVolume 
                        };
                    })
                );

                render(signalData);
                loader.classList.add('hidden');
                grid.classList.remove('opacity-0');

            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function calculateRSI(candles) {
            if (candles.length < 15) return 50;
            const closes = candles.map(c => parseFloat(c[4]));
            let gains = 0, losses = 0;
            for (let i = 1; i < 15; i++) {
                let diff = closes[i] - closes[i-1];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            const rs = gains / (losses || 1);
            return 100 - (100 / (1 + rs));
        }

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            data.forEach((item) => {
                const rsi = calculateRSI(item.candles);
                const price = parseFloat(item.price);
                
                // LOGIKA SIGNAL (Dibuat adaptif agar data selalu muncul)
                let type = null;
                let color = "";
                if (rsi < 48) { type = "LONG"; color = "#10b981"; }
                else if (rsi > 52) { type = "SHORT"; color = "#ff4d4d"; }

                if (type) {
                    const card = document.createElement('div');
                    card.className = "glass-card p-6 flex flex-col justify-between";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-8">
                            <div>
                                <h3 class="text-2xl font-black tracking-tighter text-white uppercase">${item.symbol.replace('USDT','')}</h3>
                                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Vol: $${(item.vol/1000000).toFixed(1)}M</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold mono" style="color: ${color}">$${price.toLocaleString()}</p>
                                <div class="flex items-center gap-2 mt-2 justify-end">
                                    <span class="w-2 h-2 rounded-full animate-pulse" style="background: ${color}"></span>
                                    <span class="text-[10px] font-black tracking-widest" style="color: ${color}">${type}_ENTRY</span>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between items-center text-[11px] font-mono border-b border-white/5 pb-2">
                                <span class="text-zinc-500 uppercase">Target_Profit</span>
                                <span class="text-emerald-400 font-bold">$${type === 'LONG' ? (price * 1.025).toFixed(5) : (price * 0.975).toFixed(5)}</span>
                            </div>
                            <div class="flex justify-between items-center text-[11px] font-mono border-b border-white/5 pb-2">
                                <span class="text-zinc-500 uppercase">Stop_Loss</span>
                                <span class="text-rose-500 font-bold">$${type === 'LONG' ? (price * 0.985).toFixed(5) : (price * 1.015).toFixed(5)}</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="w-2/3 h-1 bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full transition-all duration-1000" style="width: ${rsi}%; background: ${color}"></div>
                            </div>
                            <p class="text-[10px] mono text-zinc-500 uppercase font-bold">RSI: ${rsi.toFixed(1)}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        fetchSignals();
    </script>
</body>
</html>
