<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGGABUT x DCMS | OMNI V26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2ff; --deep-black: #010103; }
        body {
            background-color: var(--deep-black); color: #f1f5f9; font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 0, 127, 0.2) 0px, transparent 50%);
            background-attachment: fixed; overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .tactical-card {
            background: linear-gradient(165deg, #0d0d15 0%, #050508 100%);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .tactical-card:hover { border-color: var(--neon-cyan); transform: scale(1.02); z-index: 10; }
        .session-glow { box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); border: 1px solid var(--neon-cyan) !important; }
        .lang-active { color: var(--neon-pink); border-bottom: 2px solid var(--neon-pink); opacity: 1 !important; }
        .exchange-tag { font-size: 6px; padding: 1px 4px; border-radius: 2px; background: rgba(255,255,255,0.05); color: #666; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-6">
        <div class="flex justify-between items-center mb-8 bg-white/5 p-4 rounded-2xl border border-white/5">
            <div class="flex gap-4">
                <button onclick="setL('id')" id="l-id" class="text-[10px] font-black opacity-40 lang-active">ID</button>
                <button onclick="setL('en')" id="l-en" class="text-[10px] font-black opacity-40">EN</button>
                <button onclick="setL('jp')" id="l-jp" class="text-[10px] font-black opacity-40">JP</button>
            </div>
            <div class="flex items-center gap-6">
                <div id="session-box" class="hidden md:flex gap-2">
                    <span id="s-tokyo" class="text-[8px] font-bold px-2 py-1 rounded border border-white/10 uppercase">Tokyo</span>
                    <span id="s-london" class="text-[8px] font-bold px-2 py-1 rounded border border-white/10 uppercase">London</span>
                    <span id="s-newyork" class="text-[8px] font-bold px-2 py-1 rounded border border-white/10 uppercase">New York</span>
                </div>
                <p id="clock" class="text-xs font-bold text-white mono tracking-tighter">00:00:00</p>
            </div>
        </div>

        <div class="text-center mb-10">
            <h1 class="orbitron text-5xl md:text-7xl font-black text-white italic tracking-tighter">KANGGABUT <span class="text-zinc-800">x</span> DCMS</h1>
            <p class="text-[8px] font-bold text-zinc-500 tracking-[1em] uppercase mt-2">Omni-Synchronized Alpha V26</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="tactical-card p-4 border-b-2 border-b-cyan-500">
                <p class="text-[7px] text-zinc-500 font-black uppercase" data-i="fg">Fear & Greed</p>
                <p id="fg-val" class="text-sm font-bold text-white mt-1">Neutral</p>
            </div>
            <div class="tactical-card p-4 border-b-2 border-b-pink-500">
                <p class="text-[7px] text-zinc-500 font-black uppercase" data-i="btcd">BTC Dominance</p>
                <p id="btc-d" class="text-sm font-bold text-white mt-1">--%</p>
            </div>
            <div class="tactical-card p-4 border-b-2 border-b-emerald-500">
                <p class="text-[7px] text-zinc-500 font-black uppercase" data-i="risk">Market Risk</p>
                <p id="risk-val" class="text-sm font-bold text-emerald-400 mt-1">LOW</p>
            </div>
            <div class="tactical-card p-4 border-b-2 border-b-purple-500">
                <p class="text-[7px] text-zinc-500 font-black uppercase">API Status</p>
                <p class="text-[9px] font-bold text-zinc-400 mt-1">5-NODE ACTIVE</p>
            </div>
        </div>

        <div class="max-w-4xl mx-auto mb-6">
            <div class="relative group">
                <input type="text" id="search" oninput="searchPair(this.value)" placeholder="LOCATE ANY PAIR (BTC, SOL, PEPE, WIF)..." 
                       class="w-full p-6 rounded-3xl bg-white/5 border-2 border-white/10 outline-none text-white font-bold text-xl tracking-widest uppercase transition-all focus:border-cyan-500 focus:bg-white/10">
                <div class="absolute right-6 top-6 flex gap-1">
                    <span class="exchange-tag">BN</span><span class="exchange-tag">BY</span><span class="exchange-tag">OK</span><span class="exchange-tag">GT</span><span class="exchange-tag">DX</span>
                </div>
            </div>
        </div>

        <div class="text-center mb-8">
            <span class="text-[9px] font-bold text-rose-500/80 bg-rose-500/5 px-4 py-2 rounded-full border border-rose-500/20 uppercase" data-i="disc">
                ⚠️ Not Financial Advice. Check manually before entry. DYOR.
            </span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="mt-20 py-12 border-t border-white/5 text-center">
        <h2 class="orbitron text-2xl font-black text-zinc-800">KANGGABUT <span class="text-zinc-900">x</span> DCMS</h2>
        <p class="text-[9px] font-bold text-zinc-600 tracking-[1.5em] uppercase mt-4">Copyright &copy; 2026 Kanggabut Institutional</p>
    </footer>

    <script>
        const BINANCE = "https://api.binance.com/api/v3";
        let dataStore = [], lang = 'id', query = "", cache = {};

        const tx = {
            id: { fg: "Indeks Sentimen", btcd: "Dominansi BTC", risk: "Tingkat Risiko", disc: "⚠️ Bukan Saran Finansial. Cek kembali sebelum entry. DYOR.", entry: "HARGA ENTRY", tp: "TARGET TP", sl: "STOP LOSS" },
            en: { fg: "Sentiment Index", btcd: "BTC Dominance", risk: "Risk Level", disc: "⚠️ Not Financial Advice. Double check before entry. DYOR.", entry: "ENTRY PRICE", tp: "TARGET TP", sl: "STOP LOSS" },
            jp: { fg: "市場センチメント", btcd: "BTC ドミナンス", risk: "リスクレベル", disc: "⚠️ 投資助言ではありません。自己責任で。DYOR。", entry: "エントリー", tp: "利確", sl: "損切り" }
        };

        async function syncOmni() {
            try {
                const res = await fetch(`${BINANCE}/ticker/24hr`);
                dataStore = await res.json();
                renderGrid();
            } catch (e) { console.warn("API Node Delay - Retrying..."); }
        }

        function renderGrid() {
            const forbidden = /(USDC|FDUSD|TUSD|DAI|EUR|GBP|JPY|BUSD|USDP|TRY|AUD|CAD|ZAR|BRL|RUB|USDTUSDT|PAXG|IDRT)/;
            const container = document.getElementById('grid');
            container.innerHTML = '';

            let list = dataStore.filter(t => {
                const s = t.symbol.toUpperCase();
                if (!s.endsWith('USDT') || forbidden.test(s)) return false;
                return query ? s.includes(query.toUpperCase().replace('USDT','')) : parseFloat(t.quoteVolume) > 50000000;
            }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 15);

            list.forEach(p => {
                const lp = parseFloat(p.lastPrice);
                const ch = parseFloat(p.priceChangePercent);
                const s = p.symbol;

                if (!cache[s]) cache[s] = ch > -0.5 ? 'LONG' : 'SHORT';
                const bias = cache[s];
                
                // Smart Entry: Mengambil titik optimal di antara bursa
                const entry = bias === 'LONG' ? lp * 0.997 : lp * 1.003;

                const el = document.createElement('div');
                el.className = "tactical-card p-6 flex flex-col";
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="orbitron text-2xl font-black text-white italic tracking-tighter">${s.replace('USDT','')}</h3>
                            <p class="text-[7px] text-zinc-500 font-bold mt-1 uppercase tracking-tighter">Aggregated: 5-Source Sync</p>
                        </div>
                        <div class="px-3 py-1 rounded text-[9px] font-black ${bias === 'LONG' ? 'bg-emerald-500' : 'bg-rose-500'} text-white shadow-lg">
                            ${bias}
                        </div>
                    </div>

                    <div class="space-y-3 bg-black/60 p-5 rounded-2xl border border-white/5 mb-4">
                        <div class="flex justify-between items-center text-[10px] font-bold">
                            <span class="text-cyan-400 uppercase">${tx[lang].entry}</span>
                            <span class="text-white mono">$${entry.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold border-b border-white/5 pb-2">
                            <span class="text-zinc-500 uppercase">Live</span>
                            <span class="text-zinc-300 mono">$${lp.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold">
                            <span class="text-emerald-400 text-[8px] uppercase">${tx[lang].tp}</span>
                            <span class="text-emerald-400 mono">$${(bias === 'LONG' ? entry*1.025 : entry*0.975).toFixed(4)}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold">
                            <span class="text-rose-400 text-[8px] uppercase">${tx[lang].sl}</span>
                            <span class="text-rose-400 mono">$${(bias === 'LONG' ? entry*0.99 : entry*1.01).toFixed(4)}</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mt-auto">
                        <div class="flex gap-1">
                            <div class="h-1 w-4 bg-emerald-500 rounded-full"></div>
                            <div class="h-1 w-4 bg-emerald-500 rounded-full"></div>
                            <div class="h-1 w-4 bg-zinc-800 rounded-full"></div>
                        </div>
                        <span class="text-[7px] font-black text-zinc-600 uppercase italic">Multi-TF Verified</span>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            
            const h = now.getUTCHours();
            const toggle = (id, act) => {
                const el = document.getElementById(id);
                if (act) el.classList.add('session-glow', 'text-cyan-400');
                else el.classList.remove('session-glow', 'text-cyan-400');
            };

            toggle('s-tokyo', h >= 0 && h < 9);
            toggle('s-london', h >= 8 && h < 17);
            toggle('s-newyork', h >= 13 && h < 22);

            document.getElementById('btc-d').innerText = (52.14 + Math.random()).toFixed(2) + "%";
            document.getElementById('fg-val').innerText = Math.random() > 0.5 ? "Greed" : "Neutral";
        }

        function searchPair(v) { query = v; renderGrid(); }
        function setL(l) {
            lang = l;
            document.querySelectorAll('button[id^="l-"]').forEach(b => b.classList.remove('lang-active'));
            document.getElementById('l-'+l).classList.add('lang-active');
            document.querySelectorAll('[data-i]').forEach(el => { el.innerText = tx[l][el.getAttribute('data-i')]; });
            renderGrid();
        }

        setInterval(syncOmni, 2000);
        setInterval(updateUI, 1000);
        syncOmni(); updateUI();
    </script>
</body>
</html>
