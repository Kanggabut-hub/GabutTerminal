<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGGABUT TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; --bg: #000000; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #112244, transparent),
                        radial-gradient(circle at 100% 100%, #0a0a0a, transparent);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .stagger-load { animation: fadeInUp 0.6s both; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="mesh-bg"></div>

    <!-- Minimalist Header -->
    <header class="max-w-6xl mx-auto flex justify-between items-end mb-16">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tighter mb-2 italic">KANGGABUT<span class="text-zinc-500 italic">.TERMINAL</span></h1>
            <div class="flex items-center gap-4 text-[10px] uppercase tracking-[0.4em] text-zinc-400 font-semibold">
                <span class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Live Node</span>
                <span class="opacity-30">|</span>
                <span>Bitunix Engine 4.0</span>
            </div>
        </div>
        <div class="text-right hidden md:block">
            <p id="clock" class="text-xl font-light mono tracking-tighter">00:00:00</p>
            <p class="text-[9px] text-zinc-600 uppercase tracking-widest mt-1">Global Market Sync</p>
        </div>
    </header>

    <!-- Main Engine -->
    <main class="max-w-6xl mx-auto">
        <div id="loading-state" class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="w-12 h-12 border-t-2 border-emerald-500 rounded-full animate-spin"></div>
            <p class="text-xs uppercase tracking-[0.3em] text-zinc-500 font-mono">Parallel Syncing...</p>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        const API = "https://api.bitunix.com/api/v1/market";

        async function init() {
            try {
                const response = await fetch(`${API}/tickers`);
                const result = await response.json();
                
                // Ambil Top 20 berdasarkan Volume
                const pairs = result.data
                    .filter(p => p.symbol.endsWith('USDT'))
                    .sort((a, b) => b.quoteVolume - a.quoteVolume)
                    .slice(0, 15);

                // PARALLEL FETCHING: Mengambil semua data candle secara bersamaan
                const candlePromises = pairs.map(p => 
                    fetch(`${API}/candles?symbol=${p.symbol}&interval=1h&limit=20`)
                    .then(res => res.json())
                    .then(data => ({ symbol: p.symbol, price: p.last, data: data.data }))
                );

                const results = await Promise.all(candlePromises);
                render(results);

            } catch (err) {
                console.error("Link Error");
            }
        }

        function calculateRSI(data) {
            if (!data || data.length < 14) return 50;
            const closes = data.map(k => parseFloat(k.close)).reverse();
            let up = 0, down = 0;
            for (let i = 1; i < 15; i++) {
                let diff = closes[i] - closes[i-1];
                if (diff >= 0) up += diff; else down -= diff;
            }
            return 100 - (100 / (1 + (up / (down || 1))));
        }

        function render(items) {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading-state');
            loading.classList.add('hidden');
            grid.innerHTML = '';

            items.forEach((item, index) => {
                const rsi = calculateRSI(item.data);
                const price = parseFloat(item.price);
                let signal = null;

                if (rsi < 42) signal = { type: 'LONG', color: '#00ffcc' };
                else if (rsi > 58) signal = { type: 'SHORT', color: '#ff3366' };

                if (signal) {
                    const card = document.createElement('div');
                    card.className = `glass-card p-8 stagger-load shimmer`;
                    card.style.animationDelay = `${index * 0.1}s`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-8">
                            <div>
                                <h2 class="text-2xl font-extrabold tracking-tighter">${item.symbol.split('USDT')[0]}<span class="text-zinc-600">/U</span></h2>
                                <p class="mono text-sm opacity-40 mt-1">${price.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <span style="color: ${signal.color}" class="text-[10px] font-black tracking-[0.3em] uppercase">${signal.type}</span>
                                <div class="mt-2 h-1 w-full bg-zinc-800 rounded-full overflow-hidden">
                                    <div class="h-full" style="width: ${rsi}%; background: ${signal.color}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 font-mono">
                            <div class="flex justify-between text-[10px]">
                                <span class="text-zinc-500 uppercase">Entry_Point</span>
                                <span class="font-bold">${signal.type === 'LONG' ? (price * 0.999).toFixed(5) : (price * 1.001).toFixed(5)}</span>
                            </div>
                            <div class="flex justify-between text-[10px]">
                                <span class="text-zinc-500 uppercase">Take_Profit</span>
                                <span class="text-emerald-400 font-bold">${signal.type === 'LONG' ? (price * 1.03).toFixed(5) : (price * 0.97).toFixed(5)}</span>
                            </div>
                            <div class="flex justify-between text-[10px]">
                                <span class="text-zinc-500 uppercase">Stop_Loss</span>
                                <span class="text-rose-500 font-bold">${signal.type === 'LONG' ? (price * 0.985).toFixed(4) : (price * 1.015).toFixed(4)}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
