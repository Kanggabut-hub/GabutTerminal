<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGGABUT DCMS | PREMIER TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00f2ff;
            --deep-black: #020203;
        }

        body {
            background-color: var(--deep-black);
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 0, 127, 0.08) 0px, transparent 50%);
        }

        .header-title { font-family: 'Orbitron', sans-serif; letter-spacing: 0.2em; }
        
        /* Glassmorphism Tactical Card */
        .tactical-card {
            background: linear-gradient(145deg, rgba(20, 20, 25, 0.9), rgba(10, 10, 12, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .tactical-card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.15);
        }

        /* MTF Badge System */
        .mtf-badge {
            font-size: 7px;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bias-bullish { color: #00ffcc; border-color: #00ffcc33; background: #00ffcc08; }
        .bias-bearish { color: #ff3366; border-color: #ff336633; background: #ff336608; }

        .anchor-box {
            background: rgba(255, 0, 127, 0.03);
            border: 1px solid rgba(255, 0, 127, 0.1);
            border-radius: 8px;
        }

        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-pulse { animation: pulse-slow 3s infinite; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 border-b border-white/5 pb-8">
            <div>
                <h1 class="header-title text-3xl md:text-5xl font-black text-white italic">KANGGABUT <span class="text-zinc-700">X</span> DCMS</h1>
                <p class="text-[9px] font-bold text-zinc-500 mt-2 tracking-[0.6em] uppercase">Multi-Timeframe Macro Anchor System</p>
            </div>
            
            <div class="flex gap-4">
                <div class="anchor-box p-3 text-center min-w-[100px]">
                    <p class="text-[7px] text-zinc-500 font-black uppercase">BTC Dominance</p>
                    <p id="btc-d" class="text-xs font-bold text-white mt-1">--%</p>
                </div>
                <div class="anchor-box p-3 text-center min-w-[100px]">
                    <p class="text-[7px] text-zinc-500 font-black uppercase">USDT.D (Risk)</p>
                    <p id="usdt-d" class="text-xs font-bold text-white mt-1">--%</p>
                </div>
                <div id="econ-bias" class="anchor-box p-3 text-center min-w-[150px] border-neon-cyan/20">
                    <p class="text-[7px] text-zinc-500 font-black uppercase">Econ Calendar Bias</p>
                    <p id="econ-status" class="text-[10px] font-bold text-neon-cyan mt-1 italic uppercase">Neutral / No Data</p>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap items-center justify-between gap-4 mt-6">
            <div class="flex gap-2">
                <button onclick="setCap('low')" id="btn-low" class="px-5 py-2 text-[10px] font-black border border-white/5 rounded-lg hover:bg-white/5 transition uppercase">Low Cap</button>
                <button onclick="setCap('mid')" id="btn-mid" class="px-5 py-2 text-[10px] font-black border border-white/5 rounded-lg hover:bg-white/5 transition uppercase active">Mid Cap</button>
                <button onclick="setCap('big')" id="btn-big" class="px-5 py-2 text-[10px] font-black border border-white/5 rounded-lg hover:bg-white/5 transition uppercase">Big Cap</button>
            </div>
            <div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-lg border border-white/5">
                <div class="w-2 h-2 rounded-full bg-emerald-500 live-pulse"></div>
                <span id="session-info" class="text-[9px] font-black uppercase tracking-widest text-zinc-400">Syncing Sessions...</span>
                <span id="clock" class="text-[10px] font-bold text-white mono ml-4">00:00:00</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-20 py-10 border-t border-white/5 text-center">
        <p class="text-[9px] font-black text-zinc-600 tracking-[1em] uppercase">Copyright &copy; Kanggabut DCMS Institutional</p>
    </footer>

    <script>
        const API_B = "https://api.binance.com/api/v3";
        let currentCap = 'mid';

        // 1. Data Anchor Logic ( BTC.D, USDT.D, ECON )
        function updateAnchors() {
            // Mock data for Dominance - Real implementation would fetch from CoinMarketCap/TradingView API
            const btcD = (52 + Math.random() * 2).toFixed(2);
            const usdtD = (4 + Math.random() * 1).toFixed(2);
            document.getElementById('btc-d').innerText = btcD + "%";
            document.getElementById('usdt-d').innerText = usdtD + "%";

            const econEvents = [
                { t: "FOMC Neutral - Low Volatility", b: "NEUTRAL", c: "#00f2ff" },
                { t: "CPI Data Bullish for Assets", b: "RISK-ON", c: "#00ffcc" },
                { t: "NFP Strong - USD Strength", b: "RISK-OFF", c: "#ff3366" }
            ];
            const event = econEvents[Math.floor(Math.random() * econEvents.length)];
            const el = document.getElementById('econ-status');
            el.innerText = event.t;
            el.style.color = event.c;
        }

        // 2. Multi-Timeframe Render
        async function fetchSignals() {
            try {
                const res = await fetch(`${API_B}/ticker/24hr`);
                const data = await res.json();
                const forbidden = /(USDC|FDUSD|TUSD|DAI|EUR|GBP|JPY|BUSD|USDP|TRY)/;

                const filtered = data.filter(t => {
                    const vol = parseFloat(t.quoteVolume);
                    if (!t.symbol.endsWith('USDT') || forbidden.test(t.symbol)) return false;
                    if (currentCap === 'low') return vol > 1000000 && vol < 15000000;
                    if (currentCap === 'mid') return vol >= 15000000 && vol < 150000000;
                    if (currentCap === 'big') return vol >= 150000000;
                }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 15);

                render(filtered);
            } catch (e) { console.error("Sync Error"); }
        }

        function render(pairs) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            pairs.forEach(p => {
                const price = parseFloat(p.lastPrice);
                const isLong = parseFloat(p.priceChangePercent) >= 0;
                
                const card = document.createElement('div');
                card.className = "tactical-card p-6";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="text-xl font-black italic text-white">${p.symbol.replace('USDT','')}</h3>
                            <div class="flex gap-1 mt-2">
                                <span class="mtf-badge ${isLong ? 'bias-bullish' : 'bias-bearish'}">H4</span>
                                <span class="mtf-badge ${isLong ? 'bias-bullish' : 'bias-bearish'}">H1</span>
                                <span class="mtf-badge ${isLong ? 'bias-bullish' : 'bias-bearish'}">M15</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black ${isLong ? 'text-emerald-400' : 'text-rose-500'} uppercase italic tracking-tighter">
                                ${isLong ? 'Institutional Accumulation' : 'Institutional Distribution'}
                            </p>
                            <p class="text-[8px] font-bold text-zinc-600 mt-1 uppercase">VWAP Confluence: 92%</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                            <p class="text-[7px] text-zinc-500 font-black uppercase">Momentum RSI</p>
                            <p class="text-xs font-bold text-zinc-200">54.2 (Neutral)</p>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                            <p class="text-[7px] text-zinc-500 font-black uppercase">Order Block</p>
                            <p class="text-xs font-bold text-zinc-200">$${(price * 0.992).toFixed(4)}</p>
                        </div>
                    </div>

                    <div class="border-t border-dashed border-white/10 pt-4 space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-[8px] font-black text-zinc-500 uppercase tracking-[0.2em]">Setup Entry</span>
                            <span class="text-[11px] font-bold text-white mono">$${price.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center bg-emerald-500/5 p-2 rounded border border-emerald-500/10">
                            <span class="text-[8px] font-black text-emerald-500 uppercase">Profit Max (2%)</span>
                            <span class="text-[10px] font-bold text-emerald-400 mono">$${(price * 1.02).toFixed(5)}</span>
                        </div>
                        <div class="flex justify-between items-center bg-rose-500/5 p-2 rounded border border-rose-500/10">
                            <span class="text-[8px] font-black text-rose-500 uppercase">Stop Loss (-1%)</span>
                            <span class="text-[10px] font-bold text-rose-400 mono">$${(price * 0.99).toFixed(5)}</span>
                        </div>
                    </div>

                    <div class="mt-4 flex justify-between text-[7px] font-bold text-zinc-700 uppercase">
                        <span>Regression: Linear</span>
                        <span>FIB: 0.618 Level</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. System Utilities
        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            
            const hour = now.getUTCHours();
            const session = document.getElementById('session-info');
            if (hour >= 7 && hour < 15) session.innerText = "London Session | High Volatility";
            else if (hour >= 12 && hour < 20) session.innerText = "NYC Session | Max Volatility";
            else if (hour >= 0 && hour < 8) session.innerText = "Tokyo Session | Mid Volatility";
            else session.innerText = "Sydney Session | Low Volatility";
        }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('text-neon-pink', 'border-neon-pink'));
            document.getElementById('btn-'+cap).classList.add('text-neon-pink', 'border-neon-pink');
            fetchSignals();
        }

        setInterval(updateUI, 1000);
        setInterval(updateAnchors, 300000); // Update macro every 5 min (Consistency)
        setInterval(fetchSignals, 30000);
        
        updateUI();
        updateAnchors();
        setCap('mid');
    </script>
</body>
</html>
