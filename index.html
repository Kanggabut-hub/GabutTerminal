<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANGGABUT x DCMS | ULTIMATE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --card-bg: rgba(10, 14, 20, 0.85);
            --cyan: #00f2ff;
            --blue: #3b82f6;
            --pink: #ff2d75;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.03) 0px, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.03) 0px, transparent 40%);
            color: #f1f5f9; min-height: 100vh; overflow-x: hidden;
        }

        /* Branding Name Styling */
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-style: italic;
            position: relative;
            display: inline-block;
        }

        .brand-glow {
            background: linear-gradient(135deg, #fff 0%, #3b82f6 50%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
        }

        .brand-sub {
            letter-spacing: 0.8em;
            font-weight: 800;
            color: #475569;
            font-size: 9px;
            margin-top: -5px;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .glass-card:hover {
            border-color: var(--cyan);
            transform: translateY(-8px);
            box-shadow: 0 35px 70px rgba(0, 242, 255, 0.1);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: white;
            transition: all 0.3s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--blue);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .pill-active {
            background: rgba(0, 242, 255, 0.08);
            color: var(--cyan);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        @keyframes pulse-dot { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .live-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse-dot 1.5s infinite; }
    </style>
</head>
<body class="p-4 md:p-12">

    <header class="max-w-7xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-center gap-10">
        <div class="text-center md:text-left">
            <h1 class="brand-logo brand-glow">KANGGABUT <span class="font-thin text-white/20 px-1">X</span> DCMS</h1>
            <div class="brand-sub">INSTITUTIONAL LIQUIDITY ENGINE</div>
        </div>
        
        <div class="flex items-center gap-8 bg-white/[0.02] p-5 rounded-3xl border border-white/5 backdrop-blur-xl">
            <div class="text-center px-4 border-r border-white/10">
                <p class="text-[7px] text-zinc-500 uppercase font-black tracking-widest">Protocol Status</p>
                <div class="flex items-center gap-2 mt-1">
                    <div class="live-dot"></div>
                    <p class="text-[10px] font-bold text-white tracking-tighter uppercase">Market Active</p>
                </div>
            </div>
            <p id="clock" class="mono text-sm font-bold text-slate-400">00:00:00</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-12">
            <input type="text" id="searchInput" placeholder="Search Altcoin Asset..." 
                   class="search-bar col-span-1 lg:col-span-3 px-8 py-5 text-sm font-medium tracking-wide">
            
            <div class="flex p-1.5 bg-white/[0.03] rounded-2xl border border-white/5">
                <button onclick="setCap('low')" id="cap-low" class="flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase text-zinc-500 transition-all">Low</button>
                <button onclick="setCap('mid')" id="cap-mid" class="flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase text-zinc-500 transition-all">Mid</button>
                <button onclick="setCap('big')" id="cap-big" class="flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase text-zinc-500 transition-all">Big</button>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-40 text-center opacity-20 text-[10px] mono tracking-[1em] uppercase">Scoping Market Liquidity...</div>
        </div>
    </main>

    <script>
        const API = "https://api.binance.com/api/v3";
        let currentCap = 'mid';
        let allData = [];

        // Clock System
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        async function fetchMarket() {
            try {
                const res = await fetch(`${API}/ticker/24hr`);
                const data = await res.json();
                
                // NO STABLES - NO FIAT - NO FOREX
                const forbidden = /(USDC|FDUSD|TUSD|DAI|USDP|EUR|GBP|JPY|AUD|CAD|TRY|BRL|ZAR|RUB|AEUR|PAXG|BUSD)/;

                const filtered = data.filter(t => {
                    const vol = parseFloat(t.quoteVolume);
                    const isUSDT = t.symbol.endsWith('USDT');
                    const name = t.symbol.replace('USDT', '');
                    
                    if (!isUSDT || forbidden.test(t.symbol) || name === "USDT") return false;

                    if (currentCap === 'low') return vol > 500000 && vol < 15000000;
                    if (currentCap === 'mid') return vol >= 15000000 && vol < 200000000;
                    if (currentCap === 'big') return vol >= 200000000;
                }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 32);

                allData = await Promise.all(filtered.map(async (p) => {
                    const cRes = await fetch(`${API}/klines?symbol=${p.symbol}&interval=1h&limit=24`);
                    const candles = await cRes.json();
                    return { p, candles };
                }));
                render();
            } catch (e) { console.error("Link Failure"); }
        }

        function render() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('searchInput').value.toUpperCase();
            grid.innerHTML = '';

            const filtered = allData.filter(d => d.p.symbol.includes(search));

            filtered.forEach(({p, candles}) => {
                const price = parseFloat(p.lastPrice);
                const change = parseFloat(p.priceChangePercent);
                const isLong = change >= 0;
                const tp = isLong ? price * 1.02 : price * 0.98;
                const sl = isLong ? price * 0.98 : price * 1.02;

                const card = document.createElement('div');
                card.className = "glass-card p-8 flex flex-col h-full";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h3 class="text-2xl font-extrabold tracking-tighter text-white uppercase">${p.symbol.replace('USDT','')}</h3>
                            <p class="text-[8px] font-black text-blue-500/60 tracking-[0.2em] mt-1 uppercase">Crypto Asset</p>
                        </div>
                        <div class="text-right">
                            <span class="px-3 py-1 rounded-lg text-[9px] font-black border ${isLong ? 'border-emerald-500/20 text-emerald-400 bg-emerald-400/5' : 'border-pink-500/20 text-pink-400 bg-pink-500/5'}">
                                ${isLong ? 'BUY_SIDE' : 'SELL_SIDE'}
                            </span>
                            <p class="text-[10px] font-bold mono mt-2 ${change >= 0 ? 'text-emerald-400' : 'text-pink-500'}">${change}%</p>
                        </div>
                    </div>

                    <div class="space-y-5">
                        <div class="flex justify-between items-center border-b border-white/5 pb-3">
                            <span class="text-[8px] font-bold text-zinc-600 uppercase tracking-widest">Entry Price</span>
                            <span class="text-xs font-bold mono italic tracking-tighter text-white">$${price.toLocaleString()}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div class="bg-emerald-500/[0.03] p-4 rounded-2xl border border-emerald-500/10">
                                <p class="text-[7px] font-black text-emerald-500 uppercase mb-1 tracking-widest">Target TP</p>
                                <p class="text-[10px] font-bold text-white mono">${tp.toFixed(5)}</p>
                            </div>
                            <div class="bg-pink-500/[0.03] p-4 rounded-2xl border border-pink-500/10 text-right">
                                <p class="text-[7px] font-black text-pink-500 uppercase mb-1 tracking-widest">Stop Loss</p>
                                <p class="text-[10px] font-bold text-white mono">${sl.toFixed(5)}</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-auto pt-10">
                        <div class="flex justify-between text-[8px] font-black uppercase text-zinc-700 mb-2">
                            <span>SMC Confirmation</span>
                            <span class="text-zinc-500 tracking-tighter">$${(parseFloat(p.quoteVolume)/1000000).toFixed(1)}M VOL</span>
                        </div>
                        <div class="h-[2px] w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600 transition-all duration-1000" style="width: ${Math.min(Math.abs(change)*10, 100)}%"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('button[id^="cap-"]').forEach(b => b.className = "flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase text-zinc-500 transition-all");
            document.getElementById('cap-'+cap).classList.add('pill-active');
            fetchMarket();
        }

        document.getElementById('searchInput').addEventListener('input', render);
        
        // Boot Engine
        setCap('mid');
        setInterval(fetchMarket, 60000);
    </script>
</body>
</html>
