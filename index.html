<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANGGABUT x DCMS | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --card-bg: rgba(10, 14, 20, 0.85);
            --cyan: #00f2ff;
            --blue: #3b82f6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
            color: #f1f5f9; min-height: 100vh;
        }

        /* Responsive Branding */
        .brand-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-logo {
            /* Menggunakan clamp agar ukuran font adaptif: Min 1.5rem, Pref 4vw, Max 2.2rem */
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(135deg, #fff 0%, #3b82f6 50%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .brand-sub {
            letter-spacing: 0.5em;
            font-weight: 700;
            color: #475569;
            font-size: clamp(7px, 1.5vw, 9px);
            margin-top: 2px;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--cyan);
            transform: translateY(-5px);
        }

        .cap-filter-container {
            max-width: 400px;
            margin: 0 auto 3rem auto;
        }

        .btn-cap {
            flex: 1;
            padding: 10px 0;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            transition: all 0.3s;
            letter-spacing: 0.1em;
        }

        .btn-cap.active {
            color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
            border-radius: 12px;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .live-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse-dot 2s infinite; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto flex flex-col items-center">
        <div class="brand-container">
            <h1 class="brand-logo">KANGGABUT <span class="font-thin text-white/20">X</span> DCMS</h1>
            <div class="brand-sub">LIQUIDITY MONITOR</div>
        </div>

        <div class="flex items-center gap-4 mb-10 bg-white/[0.02] px-4 py-2 rounded-full border border-white/5">
            <div class="flex items-center gap-2 pr-4 border-r border-white/10">
                <div class="live-dot"></div>
                <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Live</span>
            </div>
            <div id="clock" class="mono text-[10px] font-bold text-zinc-400">00:00:00</div>
        </div>

        <div class="cap-filter-container w-full">
            <div class="flex p-1 bg-white/[0.03] rounded-2xl border border-white/5">
                <button onclick="setCap('low')" id="cap-low" class="btn-cap">Low Cap</button>
                <button onclick="setCap('mid')" id="cap-mid" class="btn-cap">Mid Cap</button>
                <button onclick="setCap('big')" id="cap-big" class="btn-cap">Big Cap</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full py-20 text-center opacity-20 text-[9px] mono tracking-[0.8em] uppercase">Syncing Market Data...</div>
        </div>
    </main>

    <script>
        const API = "https://api.binance.com/api/v3";
        let currentCap = 'mid';
        let marketCache = [];

        // Clock Update
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        async function fetchMarket() {
            try {
                const res = await fetch(`${API}/ticker/24hr`);
                const data = await res.json();
                
                const forbidden = /(USDC|FDUSD|TUSD|DAI|USDP|EUR|GBP|JPY|AUD|CAD|TRY|BRL|ZAR|RUB|AEUR|PAXG|BUSD)/;

                const filtered = data.filter(t => {
                    const vol = parseFloat(t.quoteVolume);
                    if (!t.symbol.endsWith('USDT') || forbidden.test(t.symbol) || t.symbol === "USDTUSDT") return false;

                    if (currentCap === 'low') return vol > 100000 && vol < 10000000;
                    if (currentCap === 'mid') return vol >= 10000000 && vol < 150000000;
                    if (currentCap === 'big') return vol >= 150000000;
                }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 32);

                marketCache = filtered;
                render();
            } catch (e) { console.error("API Error"); }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            marketCache.forEach(p => {
                const price = parseFloat(p.lastPrice);
                const change = parseFloat(p.priceChangePercent);
                const isLong = change >= 0;

                const card = document.createElement('div');
                card.className = "glass-card p-6 flex flex-col";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="text-xl font-extrabold tracking-tight text-white">${p.symbol.replace('USDT','')}</h3>
                            <p class="text-[8px] font-black text-blue-500/50 tracking-widest mt-1 uppercase">Altcoin</p>
                        </div>
                        <span class="text-[8px] font-black px-2 py-1 rounded bg-white/5 border border-white/5 ${isLong ? 'text-emerald-400' : 'text-pink-500'}">
                            ${change}%
                        </span>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                            <span class="text-[8px] font-bold text-zinc-600 uppercase">Price</span>
                            <span class="text-xs font-bold mono italic text-zinc-200">$${price.toLocaleString()}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-1">
                            <div class="bg-emerald-500/[0.02] p-3 rounded-xl border border-emerald-500/10">
                                <p class="text-[7px] font-black text-emerald-500 uppercase mb-1">Target TP</p>
                                <p class="text-[10px] font-bold text-zinc-100 mono">${(isLong ? price*1.02 : price*0.98).toFixed(5)}</p>
                            </div>
                            <div class="bg-pink-500/[0.02] p-3 rounded-xl border border-pink-500/10 text-right">
                                <p class="text-[7px] font-black text-pink-500 uppercase mb-1">Stop Loss</p>
                                <p class="text-[10px] font-bold text-zinc-100 mono">${(isLong ? price*0.98 : price*1.02).toFixed(5)}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('.btn-cap').forEach(b => b.classList.remove('active'));
            document.getElementById('cap-'+cap).classList.add('active');
            fetchMarket();
        }

        setCap('mid');
        setInterval(fetchMarket, 30000);
    </script>
</body>
</html>
