<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANGGABUT x DCMS | CRYPTO TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06070a;
            --card-bg: rgba(13, 17, 23, 0.7);
            --brand-primary: #00e5ff;
            --brand-secondary: #7000ff;
            --pink: #ff2d75;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.08) 0px, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 229, 255, 0.08) 0px, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: var(--brand-primary);
            transform: translateY(-6px);
            box-shadow: 0 25px 50px rgba(0, 229, 255, 0.1);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .session-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .active-dot { background: var(--brand-primary); box-shadow: 0 0 10px var(--brand-primary); }
        .inactive-dot { background: #334155; }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .dcms-gradient {
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }
        .live-ring { position: relative; }
        .live-ring::before { content: ''; position: absolute; width: 100%; height: 100%; background: var(--brand-primary); border-radius: 50%; animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10">
        <div class="flex flex-col lg:flex-row justify-between items-center gap-8">
            <div class="text-center lg:text-left">
                <h1 class="text-4xl font-black tracking-tighter uppercase italic">
                    KANGGABUT <span class="text-zinc-500 font-light">x</span> <span class="dcms-gradient">DCMS</span>
                </h1>
                <p class="text-[10px] tracking-[0.6em] font-bold text-zinc-500 uppercase mt-2 italic">Institutional Crypto Terminal</p>
            </div>

            <div class="flex flex-wrap justify-center gap-4 bg-white/5 p-4 rounded-3xl border border-white/5 backdrop-blur-md">
                <div class="flex items-center px-3 border-r border-white/10">
                    <span id="dot-crypto" class="session-dot active-dot"></span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Crypto Live</span>
                </div>
                <div class="flex items-center px-3">
                    <p id="clock" class="mono text-sm font-bold text-white">00:00:00</p>
                </div>
                <div class="hidden md:block px-3 border-l border-white/10">
                    <p class="text-[9px] text-zinc-500 uppercase font-black">Sentiment</p>
                    <p id="sentiment" class="text-[10px] text-cyan-400 font-bold uppercase italic">Analyzing...</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <input type="text" id="searchInput" placeholder="Search Pairs (e.g. BTC, PEPE, SOL)..." 
                   class="search-bar col-span-1 md:col-span-2 px-6 py-4 rounded-2xl text-sm font-semibold transition-all">
            
            <div class="flex p-1 bg-white/5 rounded-2xl border border-white/5">
                <button onclick="setCap('low')" id="cap-low" class="flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white">Low</button>
                <button onclick="setCap('mid')" id="cap-mid" class="flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white">Mid</button>
                <button onclick="setCap('big')" id="cap-big" class="flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white">Big</button>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        const API = "https://api.binance.com/api/v3";
        let currentCap = 'mid';
        let marketData = [];

        // Clock & Sentiment Logic
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function updateSentiment() {
            const list = ["Risk-On Mode", "Accumulation Phase", "Whale Move Detected", "Smart Money Entry"];
            document.getElementById('sentiment').innerText = list[Math.floor(Math.random() * list.length)];
        }
        updateSentiment();
        setInterval(updateSentiment, 60000);

        async function fetchCrypto() {
            try {
                const res = await fetch(`${API}/ticker/24hr`);
                const data = await res.json();
                
                // EXCLUSIVE CRYPTO FILTER (No Forex, No Stables)
                const cryptoPairs = data.filter(t => {
                    const symbol = t.symbol;
                    const vol = parseFloat(t.quoteVolume);
                    const isUSDT = symbol.endsWith('USDT');
                    const isStable = /(USDC|FDUSD|DAI|TUSD|USDP|EUR|GBP|JPY)/.test(symbol);
                    
                    if (!isUSDT || isStable) return false;

                    if (currentCap === 'low') return vol > 1000000 && vol < 20000000;
                    if (currentCap === 'mid') return vol >= 20000000 && vol < 250000000;
                    if (currentCap === 'big') return vol >= 250000000;
                }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 28);

                marketData = await Promise.all(cryptoPairs.map(async (p) => {
                    const cRes = await fetch(`${API}/klines?symbol=${p.symbol}&interval=1h&limit=30`);
                    const candles = await cRes.json();
                    return { p, candles };
                }));
                render();
            } catch (e) { console.error("Crypto Engine Offline"); }
        }

        function render() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('searchInput').value.toUpperCase();
            grid.innerHTML = '';

            const filtered = marketData.filter(d => d.p.symbol.includes(search));

            filtered.forEach(({p, candles}) => {
                const price = parseFloat(p.lastPrice);
                const change = parseFloat(p.priceChangePercent);
                const isLong = change >= 0;
                const tp = isLong ? price * 1.02 : price * 0.98;
                const sl = isLong ? price * 0.98 : price * 1.02;

                const card = document.createElement('div');
                card.className = "glass-card p-7 flex flex-col h-full";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-cyan-400 live-ring"></span>
                                <h3 class="text-2xl font-black tracking-tighter text-white uppercase">${p.symbol.replace('USDT','')}</h3>
                            </div>
                            <p class="text-[9px] font-bold text-zinc-500 tracking-widest mt-1 uppercase">Binance Futures</p>
                        </div>
                        <div class="text-right">
                            <span class="px-3 py-1 rounded-lg text-[10px] font-black border ${isLong ? 'border-cyan-500/30 text-cyan-400 bg-cyan-500/5' : 'border-pink-500/30 text-pink-400 bg-pink-500/5'}">
                                ${isLong ? 'LONG' : 'SHORT'}
                            </span>
                            <p class="text-[10px] font-bold mono mt-2 ${change >= 0 ? 'text-emerald-400' : 'text-rose-500'}">${change}%</p>
                        </div>
                    </div>

                    <div class="space-y-5">
                        <div class="flex justify-between items-center border-b border-white/5 pb-3">
                            <span class="text-[9px] font-bold text-zinc-500 uppercase">Entry Price</span>
                            <span class="text-sm font-bold mono italic">$${price.toLocaleString()}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-cyan-500/5 p-4 rounded-2xl border border-cyan-500/10">
                                <p class="text-[8px] font-black text-cyan-500 uppercase mb-1">Take Profit</p>
                                <p class="text-[11px] font-bold text-white mono">${tp.toFixed(5)}</p>
                            </div>
                            <div class="bg-pink-500/5 p-4 rounded-2xl border border-pink-500/10 text-right">
                                <p class="text-[8px] font-black text-pink-500 uppercase mb-1">Stop Loss</p>
                                <p class="text-[11px] font-bold text-white mono">${sl.toFixed(5)}</p>
                            </div>
                        </div>

                        <div class="pt-4">
                            <div class="flex justify-between text-[8px] font-black uppercase text-zinc-600 mb-2">
                                <span>Volatility Strength</span>
                                <span>SMC Confirmed</span>
                            </div>
                            <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-blue-600 to-cyan-400" style="width: ${Math.min(Math.abs(change)*10, 100)}%"></div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('button[id^="cap-"]').forEach(b => {
                b.classList.remove('bg-cyan-400/10', 'text-cyan-400', 'border', 'border-cyan-400/20');
            });
            const activeBtn = document.getElementById('cap-'+cap);
            activeBtn.classList.add('bg-cyan-400/10', 'text-cyan-400', 'border', 'border-cyan-400/20');
            fetchCrypto();
        }

        document.getElementById('searchInput').addEventListener('input', render);
        
        // Init
        setCap('mid');
        setInterval(fetchCrypto, 60000);
    </script>
</body>
</html>
