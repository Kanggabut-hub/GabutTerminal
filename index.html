<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGGABUT TERMINAL | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #030712;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e1b4b, transparent),
                radial-gradient(circle at 0% 100%, #0f172a, transparent);
            color: #f8fafc;
            min-h-screen;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        .neon-border-long { border-left: 4px solid var(--primary); box-shadow: -5px 0 15px rgba(0, 242, 255, 0.2); }
        .neon-border-short { border-left: 4px solid #f43f5e; box-shadow: -5px 0 15px rgba(244, 63, 94, 0.2); }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .scanning-bar {
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            height: 1px;
            width: 100%;
            position: absolute;
            animation: scan-move 3s linear infinite;
        }
        @keyframes scan-move {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(500%); }
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header Modern -->
    <nav class="sticky top-0 z-50 px-6 py-4 bg-black/20 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center font-bold text-black shadow-lg shadow-cyan-500/20">K</div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight neon-text">KANGGABUT <span class="text-cyan-400">TERMINAL</span></h1>
                    <div class="flex items-center gap-2 text-[10px] text-zinc-500 uppercase tracking-[0.2em]">
                        <span class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-pulse"></span>
                        Bitunix Live Feed
                    </div>
                </div>
            </div>
            <div class="text-right hidden md:block">
                <p id="clock" class="text-sm font-medium tracking-wider mono">00:00:00</p>
                <p id="next-scan" class="text-[10px] text-zinc-500">AUTO-REFRESH IN 60S</p>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 mt-10">
        
        <!-- Status Bar -->
        <div class="glass p-4 mb-10 flex flex-wrap gap-6 items-center justify-between border-cyan-500/10">
            <div class="flex gap-4">
                <div class="text-xs">
                    <p class="text-zinc-500 mb-1">MARKET STATUS</p>
                    <p class="font-bold text-emerald-400 uppercase">Volatile</p>
                </div>
                <div class="text-xs border-l border-white/10 pl-4">
                    <p class="text-zinc-500 mb-1">SCANNING ENGINE</p>
                    <p id="engine-status" class="font-bold text-white uppercase">V3.0.0 Stable</p>
                </div>
            </div>
            <div id="loading-indicator" class="hidden">
                <div class="flex gap-1">
                    <div class="w-1 h-4 bg-cyan-500 animate-bounce"></div>
                    <div class="w-1 h-4 bg-cyan-500 animate-bounce [animation-delay:0.1s]"></div>
                    <div class="w-1 h-4 bg-cyan-500 animate-bounce [animation-delay:0.2s]"></div>
                </div>
            </div>
        </div>

        <!-- Sinyal Grid -->
        <div id="signal-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Sinyal Cards Go Here -->
            <div class="col-span-full py-20 text-center text-zinc-500 animate-pulse">
                <p class="mono text-sm">INITIALIZING NEURAL NETWORK...</p>
            </div>
        </div>

    </main>

    <!-- Footer Mobile Navigation Style -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md">
        <div class="glass p-3 flex justify-between items-center px-8 border-white/10 shadow-2xl">
            <div class="text-center">
                <p class="text-[10px] text-zinc-500">POWERED BY</p>
                <p class="text-xs font-bold text-white tracking-widest uppercase">BITUNIX API</p>
            </div>
            <div class="h-8 w-px bg-white/10"></div>
            <p class="text-[9px] text-zinc-400 italic text-center leading-tight">Sinyal otomatis.<br>Bukan saran finansial.</p>
        </div>
    </div>

    <script>
        const BTX_BASE = "https://api.bitunix.com/api/v1/market";
        let countdown = 60;

        // Clock & Timer
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
                                                        now.getMinutes().toString().padStart(2, '0') + ":" + 
                                                        now.getSeconds().toString().padStart(2, '0');
            countdown--;
            document.getElementById('next-scan').innerText = `AUTO-REFRESH IN ${countdown}S`;
            if(countdown <= 0) {
                countdown = 60;
                fetchData();
            }
        }, 1000);

        async function fetchData() {
            document.getElementById('loading-indicator').classList.remove('hidden');
            try {
                const resp = await fetch(`${BTX_BASE}/tickers`);
                const json = await resp.json();
                const pairs = json.data
                    .filter(p => p.symbol.endsWith('USDT'))
                    .sort((a, b) => b.quoteVolume - a.quoteVolume)
                    .slice(0, 15);

                const grid = document.getElementById('signal-grid');
                grid.innerHTML = '';

                for (const p of pairs) {
                    const kResp = await fetch(`${BTX_BASE}/candles?symbol=${p.symbol}&interval=1h&limit=20`);
                    const kData = await kResp.json();
                    
                    if (kData.data) {
                        const closes = kData.data.map(k => parseFloat(k.close));
                        const rsi = calculateRSI(closes);
                        const price = parseFloat(p.last);

                        let type = null;
                        if (rsi < 40) type = 'LONG';
                        else if (rsi > 60) type = 'SHORT';

                        if (type) renderCard(p.symbol, price, type, rsi.toFixed(1));
                    }
                }
            } catch (e) { console.error("API Error"); }
            document.getElementById('loading-indicator').classList.add('hidden');
        }

        function calculateRSI(closes) {
            let gains = 0, losses = 0;
            for (let i = 1; i < 15; i++) {
                let diff = closes[i] - closes[i-1];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            return 100 - (100 / (1 + (gains / (losses || 1))));
        }

        function renderCard(symbol, price, type, rsi) {
            const isLong = type === 'LONG';
            const grid = document.getElementById('signal-grid');
            const card = document.createElement('div');
            
            card.className = `glass p-6 overflow-hidden relative group transition-all hover:scale-[1.02] duration-300 ${isLong ? 'neon-border-long' : 'neon-border-short'}`;
            card.innerHTML = `
                <div class="scanning-bar opacity-0 group-hover:opacity-100"></div>
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-xl font-bold tracking-tighter text-white">${symbol.replace('USDT','')} <span class="text-zinc-500 text-sm">/USDT</span></h3>
                        <p class="mono text-cyan-400 mt-1 font-bold tracking-tighter">$${price.toLocaleString()}</p>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase ${isLong ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}">
                            ${type}
                        </span>
                        <p class="text-[10px] text-zinc-500 mt-2 mono">RSI: ${rsi}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-zinc-500 uppercase mb-1">Entry Range</p>
                        <p class="text-xs font-bold mono text-white">${isLong ? (price * 0.998).toFixed(4) : (price * 1.002).toFixed(4)}</p>
                    </div>
                    <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-zinc-500 uppercase mb-1">Stop Loss</p>
                        <p class="text-xs font-bold mono text-rose-500">${isLong ? (price * 0.985).toFixed(4) : (price * 1.015).toFixed(4)}</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center p-2 px-3 rounded-xl bg-white/5 border border-white/5">
                        <span class="text-[10px] text-zinc-400 uppercase">Target Profit 1</span>
                        <span class="text-xs font-bold text-emerald-400 mono">${isLong ? (price * 1.02).toFixed(4) : (price * 0.98).toFixed(4)}</span>
                    </div>
                    <div class="flex justify-between items-center p-2 px-3 rounded-xl bg-cyan-500/5 border border-cyan-500/10">
                        <span class="text-[10px] text-cyan-400 uppercase">Target Profit 2</span>
                        <span class="text-xs font-bold text-cyan-400 mono">${isLong ? (price * 1.05).toFixed(4) : (price * 0.95).toFixed(4)}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        fetchData();
    </script>
</body>
</html>
