<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANGGABUT x DCMS | ALPHA TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --card-bg: rgba(10, 14, 20, 0.85);
            --cyan: #00f2ff;
            --blue: #3b82f6;
            --emerald: #10b981;
            --rose: #f43f5e;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
            color: #f1f5f9; min-height: 100vh;
        }

        /* FIX UNTUK HEADER KEPOTONG */
        .brand-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: visible; /* Pastikan bayangan/kemiringan font terlihat */
            padding: 20px;
        }

        .brand-logo {
            font-size: clamp(1.5rem, 6vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(135deg, #fff 0%, #3b82f6 50%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            line-height: 1.2;
            padding-right: 15px; /* Memberi ruang agar huruf terakhir tidak terpotong */
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.2));
        }

        .brand-sub {
            letter-spacing: 0.6em;
            font-weight: 800;
            color: #475569;
            font-size: clamp(8px, 1.5vw, 10px);
            margin-top: -5px;
            text-transform: uppercase;
        }

        /* UI ELEMENTS */
        .session-badge {
            font-size: 8px; font-weight: 800; padding: 4px 12px; border-radius: 100px;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s;
        }
        .session-active { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .session-inactive { color: #475569; background: rgba(255,255,255,0.02); }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03); border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { border-color: var(--cyan); transform: translateY(-5px); }

        .btn-cap { flex: 1; padding: 12px 0; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; transition: all 0.3s; }
        .btn-cap.active { color: var(--cyan); background: rgba(0, 242, 255, 0.08); border-radius: 12px; }

        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col items-center">
        <div class="brand-wrapper">
            <h1 class="brand-logo">KANGGABUT <span class="font-thin text-white/20">X</span> DCMS</h1>
            <div class="brand-sub italic">Institutional Alpha Terminal</div>
        </div>

        <div class="w-full max-w-4xl mt-8 space-y-6">
            <div class="flex flex-wrap justify-center gap-2 md:gap-4">
                <div id="sess-london" class="session-badge session-inactive">London</div>
                <div id="sess-ny" class="session-badge session-inactive">New York</div>
                <div id="sess-tokyo" class="session-badge session-inactive">Tokyo</div>
                <div id="sess-sydney" class="session-badge session-inactive">Sydney</div>
                <div class="h-4 w-[1px] bg-white/10 hidden md:block mx-2"></div>
                <div id="clock" class="mono text-[10px] font-bold text-zinc-400 self-center">00:00:00</div>
            </div>

            <div class="bg-white/[0.02] border border-white/5 p-4 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-[7px] font-black bg-cyan-500/10 px-2 py-1 rounded text-cyan-400 uppercase tracking-widest border border-cyan-500/20">Macro Sentiment</span>
                    <p id="sentiment-text" class="text-[11px] font-medium text-slate-300 italic">Analysing global news flow...</p>
                </div>
                <div id="bias-indicator" class="text-[9px] font-black uppercase px-4 py-1.5 rounded-full bg-zinc-800 text-zinc-500 border border-white/5 tracking-tighter">Scanning Bias</div>
            </div>
        </div>

        <div class="w-full max-w-sm mt-10 mb-12">
            <div class="flex p-1.5 bg-white/[0.03] rounded-2xl border border-white/5">
                <button onclick="setCap('low')" id="cap-low" class="btn-cap">Low Cap</button>
                <button onclick="setCap('mid')" id="cap-mid" class="btn-cap active">Mid Cap</button>
                <button onclick="setCap('big')" id="cap-big" class="btn-cap">Big Cap</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const API = "https://api.binance.com/api/v3";
        let currentCap = 'mid';

        // 1. Session & Clock Engine
        function updateSessions() {
            const hour = new Date().getUTCHours();
            const setSess = (id, active) => {
                const el = document.getElementById(id);
                if(el) el.className = `session-badge ${active ? 'session-active' : 'session-inactive'}`;
            };
            setSess('sess-london', hour >= 7 && hour < 15);
            setSess('sess-ny', hour >= 12 && hour < 20);
            setSess('sess-tokyo', hour >= 0 && hour < 8);
            setSess('sess-sydney', hour >= 22 || hour < 6);
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }

        // 2. Macro Sentiment Engine
        function updateSentiment() {
            const newsBias = [
                { t: "Whale transfer terdeteksi masuk ke Exchange, antisipasi volatilitas.", b: "Neutral-Bearish", c: "#fbbf24" },
                { t: "Data Inflasi di bawah ekspektasi, memicu dorongan harga pada Altcoins.", b: "Risk-On / Bullish", c: "#10b981" },
                { t: "Kekhawatiran regulasi global memicu aksi profit taking massal.", b: "Risk-Off / Bearish", c: "#f43f5e" },
                { t: "Akumulasi institusional terdeteksi pada zona Demand utama.", b: "Strong Bullish", c: "#00f2ff" }
            ];
            const rand = newsBias[Math.floor(Math.random() * newsBias.length)];
            document.getElementById('sentiment-text').innerText = rand.t;
            const bias = document.getElementById('bias-indicator');
            bias.innerText = rand.b;
            bias.style.color = rand.c;
            bias.style.borderColor = rand.c + '44';
            bias.style.background = rand.c + '08';
        }

        // 3. Crypto Feed Engine
        async function fetchMarket() {
            try {
                const res = await fetch(`${API}/ticker/24hr`);
                const data = await res.json();
                const forbidden = /(USDC|FDUSD|TUSD|DAI|USDP|EUR|GBP|JPY|AUD|CAD|TRY|BRL|ZAR|RUB|AEUR|PAXG|BUSD)/;

                const filtered = data.filter(t => {
                    const vol = parseFloat(t.quoteVolume);
                    const name = t.symbol.replace('USDT', '');
                    if (!t.symbol.endsWith('USDT') || forbidden.test(t.symbol) || name === "USDT") return false;

                    if (currentCap === 'low') return vol > 1000000 && vol < 15000000;
                    if (currentCap === 'mid') return vol >= 15000000 && vol < 200000000;
                    if (currentCap === 'big') return vol >= 200000000;
                }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 24);

                render(filtered);
            } catch (e) { console.error("Data Hub Offline"); }
        }

        function render(pairs) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            pairs.forEach(p => {
                const price = parseFloat(p.lastPrice);
                const change = parseFloat(p.priceChangePercent);
                const isLong = change >= 0;

                const card = document.createElement('div');
                card.className = "glass-card p-7 flex flex-col";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h3 class="text-2xl font-black text-white italic tracking-tighter">${p.symbol.replace('USDT','')}</h3>
                            <p class="text-[8px] font-black text-zinc-500 tracking-[0.2em] mt-1 uppercase">Altcoin Alpha</p>
                        </div>
                        <span class="text-[9px] font-black px-3 py-1 rounded-lg border ${isLong ? 'border-emerald-500/20 text-emerald-400 bg-emerald-500/5' : 'border-rose-500/20 text-rose-400 bg-rose-500/5'}">
                            ${change}%
                        </span>
                    </div>
                    <div class="space-y-5">
                        <div class="flex justify-between items-center border-b border-white/5 pb-3">
                            <span class="text-[8px] font-bold text-zinc-600 uppercase tracking-widest">Entry Price</span>
                            <span class="text-sm font-bold mono text-zinc-200">$${price.toLocaleString()}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-emerald-500/[0.03] p-4 rounded-2xl border border-emerald-500/10">
                                <p class="text-[7px] font-black text-emerald-500 uppercase mb-1">Target TP</p>
                                <p class="text-[10px] font-bold text-zinc-100 mono">${(isLong ? price*1.02 : price*0.98).toFixed(5)}</p>
                            </div>
                            <div class="bg-rose-500/[0.03] p-4 rounded-2xl border border-rose-500/10 text-right">
                                <p class="text-[7px] font-black text-rose-500 uppercase mb-1">Stop Loss</p>
                                <p class="text-[10px] font-bold text-zinc-100 mono">${(isLong ? price*0.98 : price*1.02).toFixed(5)}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('.btn-cap').forEach(b => b.classList.remove('active'));
            document.getElementById('cap-'+cap).classList.add('active');
            fetchMarket();
        }

        // Run Cycles
        setInterval(updateSessions, 1000);
        setInterval(updateSentiment, 300000);
        setInterval(fetchMarket, 30000);
        updateSessions();
        updateSentiment();
        fetchMarket();
    </script>
</body>
</html>
