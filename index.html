<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANGGABUT x DCMS | PRO TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020305;
            --card-bg: #0d1117;
            --accent-cyan: #00f2ff;
            --accent-blue: #3b82f6;
            --long-green: #00ff88;
            --short-red: #ff3366;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        /* Branding Fix - Anti Potong */
        .brand-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            overflow: visible;
        }

        .brand-logo {
            font-size: clamp(1.6rem, 7vw, 3rem);
            font-weight: 800;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(to right, #fff, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.4;
            padding-right: 20px; /* Ruang aman untuk huruf S */
        }

        /* Information Card */
        .pair-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .pair-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-4px);
        }

        /* Accessibility: High Contrast Badges */
        .bias-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .long-theme { background: #064e3b; color: #34d399; border: 1px solid #059669; }
        .short-theme { background: #450a0a; color: #f87171; border: 1px solid #b91c1c; }

        .indicator-tag {
            font-size: 9px;
            color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-filter {
            flex: 1; padding: 12px; font-size: 11px; font-weight: 700; color: var(--text-dim); transition: 0.3s;
        }
        .btn-filter.active { color: var(--accent-cyan); background: rgba(0,242,255,0.1); border-radius: 12px; }

        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto flex flex-col items-center">
        <div class="brand-wrapper">
            <h1 class="brand-logo">KANGGABUT <span class="font-light opacity-30">X</span> DCMS</h1>
            <p class="text-[9px] tracking-[0.4em] font-bold text-slate-500 uppercase">Institutional Intelligence V16</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl mt-6">
            <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center">
                <p class="text-[8px] text-slate-500 uppercase font-black">Sentiment</p>
                <p id="macro-bias" class="text-[10px] font-bold text-cyan-400">ANALYZING...</p>
            </div>
            <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center">
                <p class="text-[8px] text-slate-500 uppercase font-black">Volatility</p>
                <p id="vol-status" class="text-[10px] font-bold text-emerald-400">STABLE</p>
            </div>
            <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center col-span-2">
                <p class="text-[8px] text-slate-500 uppercase font-black">Active Sessions</p>
                <div id="sessions" class="flex justify-center gap-2 mt-1">
                    <span class="text-[9px] font-bold opacity-20" id="s-tokyo">TKY</span>
                    <span class="text-[9px] font-bold opacity-20" id="s-london">LDN</span>
                    <span class="text-[9px] font-bold opacity-20" id="s-ny">NYC</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-sm mt-10 mb-10 flex bg-white/5 p-1 rounded-2xl border border-white/10">
            <button onclick="setCap('low')" id="cap-low" class="btn-filter">Low Cap</button>
            <button onclick="setCap('mid')" id="cap-mid" class="btn-filter active">Mid Cap</button>
            <button onclick="setCap('big')" id="cap-big" class="btn-filter">Big Cap</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        const API = "https://api.binance.com/api/v3";
        let currentCap = 'mid';

        async function engine() {
            try {
                const res = await fetch(`${API}/ticker/24hr`);
                const data = await res.json();
                const forbidden = /(USDC|FDUSD|TUSD|DAI|USDP|EUR|GBP|JPY|AUD|CAD|TRY|BRL|ZAR|RUB|AEUR|PAXG|BUSD)/;

                const filtered = data.filter(t => {
                    const vol = parseFloat(t.quoteVolume);
                    if (!t.symbol.endsWith('USDT') || forbidden.test(t.symbol) || t.symbol === "USDTUSDT") return false;
                    if (currentCap === 'low') return vol > 1000000 && vol < 15000000;
                    if (currentCap === 'mid') return vol >= 15000000 && vol < 150000000;
                    if (currentCap === 'big') return vol >= 150000000;
                }).sort((a,b) => b.quoteVolume - a.quoteVolume).slice(0, 18);

                render(filtered);
                updateGlobalUI();
            } catch (e) { console.error("Engine Stalled"); }
        }

        function render(pairs) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            pairs.forEach(p => {
                const price = parseFloat(p.lastPrice);
                const change = parseFloat(p.priceChangePercent);
                
                // MOCK LOGIC FOR MULTI-INDICATOR BIAS (In real app, use Technical Indicator Library)
                const rsi = 40 + (Math.random() * 30);
                const isLong = change > -1 && rsi < 60; 
                const risk = (Math.random() * 1.5 + 1).toFixed(2);
                
                const card = document.createElement('div');
                card.className = "pair-card";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="text-2xl font-black italic tracking-tighter text-white">${p.symbol.replace('USDT','')}</h3>
                            <div class="flex gap-1 mt-2">
                                <span class="indicator-tag">OB</span>
                                <span class="indicator-tag">VWAP</span>
                                <span class="indicator-tag">FIB</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="bias-badge ${isLong ? 'long-theme' : 'short-theme'}">
                                ${isLong ? 'Bias: LONG' : 'Bias: SHORT'}
                            </span>
                            <p class="text-[9px] font-bold text-zinc-500 mt-2 mono">Risk/Trade: ${risk}%</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="border-l-2 border-white/10 pl-3">
                            <p class="text-[8px] font-bold text-zinc-500 uppercase">Demand/Supply</p>
                            <p class="text-[11px] font-bold text-zinc-200 mono">$${(price * 0.995).toFixed(4)}</p>
                        </div>
                        <div class="border-l-2 border-white/10 pl-3">
                            <p class="text-[8px] font-bold text-zinc-500 uppercase">Volume POC</p>
                            <p class="text-[11px] font-bold text-zinc-200 mono">$${(parseFloat(p.quoteVolume)/1000000).toFixed(1)}M</p>
                        </div>
                    </div>

                    <div class="space-y-3 bg-black/20 p-4 rounded-xl border border-white/5">
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-zinc-500">Suggested Entry</span>
                            <span class="text-white mono">$${price.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-emerald-500 uppercase">Target TP</span>
                            <span class="text-emerald-400 mono">$${(isLong ? price*1.025 : price*0.975).toFixed(5)}</span>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-rose-500 uppercase">Stop Loss</span>
                            <span class="text-rose-400 mono">$${(isLong ? price*0.985 : price*1.015).toFixed(5)}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateGlobalUI() {
            const hour = new Date().getUTCHours();
            document.getElementById('s-tokyo').style.opacity = (hour >= 0 && hour < 8) ? "1" : "0.2";
            document.getElementById('s-london').style.opacity = (hour >= 7 && hour < 15) ? "1" : "0.2";
            document.getElementById('s-ny').style.opacity = (hour >= 12 && hour < 20) ? "1" : "0.2";
            
            const moods = ["Risk-On", "Accumulation", "Distribution", "Panic", "Neutral"];
            document.getElementById('macro-bias').innerText = moods[Math.floor(Math.random()*moods.length)].toUpperCase();
        }

        function setCap(cap) {
            currentCap = cap;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById('cap-'+cap).classList.add('active');
            engine();
        }

        setInterval(engine, 30000);
        engine();
    </script>
</body>
</html>
